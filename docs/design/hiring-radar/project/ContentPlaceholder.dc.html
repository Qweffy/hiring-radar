<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="height:100%; display:flex; flex-direction:column; overflow:hidden; font-family:var(--font-ui);">

  <!-- content header -->
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:20px; padding:22px 28px 16px; flex-shrink:0;">
    <div style="display:flex; flex-direction:column; gap:6px;">
      <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">Radar / overview</span>
      <h2 style="margin:0; font-family:var(--font-display); font-weight:600; font-size:22px; line-height:1.15; letter-spacing:-0.02em; color:var(--text-hi);">Radar overview</h2>
      <span style="font:var(--mono-sm); color:var(--text-low-content); letter-spacing:0.02em; white-space:nowrap;">512 postings · 38 new · scope us-remote</span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.Button" variant="secondary" icon-left="filter" hint-size="auto,36px">Filters</x-import>
      <sc-if value="{{ aiDisabled }}" hint-placeholder-val="{{ false }}">
        <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.Tooltip" label="Agent unavailable" hint-size="auto,36px">
          <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.Button" variant="secondary" icon-left="bot" disabled="{{ true }}" hint-size="auto,36px">Ask agent to shortlist</x-import>
        </x-import>
      </sc-if>
      <sc-if value="{{ aiEnabled }}" hint-placeholder-val="{{ true }}">
        <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.Button" variant="secondary" icon-left="bot" hint-size="auto,36px">Ask agent to shortlist</x-import>
      </sc-if>
      <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.Button" variant="primary" icon-left="play" hint-size="auto,36px">Run sweep</x-import>
    </div>
  </div>

  <!-- body -->
  <div style="flex:1; min-height:0; padding:0 28px 24px; display:flex; flex-direction:column; gap:16px; overflow:hidden;">

    <!-- tile row -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px; flex-shrink:0;">
      <div style="display:flex; flex-direction:column; gap:14px; padding:16px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card);">
        <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">New roles</span>
        <span style="font:var(--mono-xl); color:var(--text-hi);">38</span>
        <div style="height:8px; width:64%; background:rgba(147,164,179,0.09); border-radius:3px;"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:14px; padding:16px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card);">
        <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">Avg match</span>
        <span style="font:var(--mono-xl); color:var(--violet);">71<span style="font-size:16px; color:var(--text-low-content);">/100</span></span>
        <div style="height:8px; width:50%; background:rgba(167,139,250,0.16); border-radius:3px;"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:14px; padding:16px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card);">
        <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">Shortlisted</span>
        <span style="font:var(--mono-xl); color:var(--text-hi);">8</span>
        <div style="height:8px; width:40%; background:rgba(147,164,179,0.09); border-radius:3px;"></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:14px; padding:16px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card);">
        <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">Postings</span>
        <span style="font:var(--mono-xl); color:var(--text-hi);">512</span>
        <div style="height:8px; width:72%; background:rgba(147,164,179,0.09); border-radius:3px;"></div>
      </div>
    </div>

    <!-- main split -->
    <div style="display:grid; grid-template-columns:1fr 300px; gap:16px; flex:1; min-height:0;">

      <!-- signal feed placeholder -->
      <div style="display:flex; flex-direction:column; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card); overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--divider);">
          <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low); white-space:nowrap;">Signal feed</span>
          <span style="font:var(--mono-sm); color:var(--text-low-content); white-space:nowrap;">38 new</span>
        </div>
        <div style="display:flex; flex-direction:column;">
          <sc-for list="{{ rows }}" as="row" hint-placeholder-count="5">
            <div style="display:flex; align-items:center; gap:16px; padding:14px 16px; border-bottom:1px solid var(--divider);">
              <div style="flex:1; display:flex; flex-direction:column; gap:9px;">
                <div style="height:11px; width:{{ row.w1 }}; background:rgba(232,240,242,0.10); border-radius:3px;"></div>
                <div style="height:9px; width:{{ row.w2 }}; background:rgba(147,164,179,0.08); border-radius:3px;"></div>
              </div>
              <div style="height:12px; width:64px; background:rgba(61,255,162,0.10); border-radius:3px;"></div>
              <div style="height:20px; width:42px; background:rgba(167,139,250,0.12); border:1px solid rgba(167,139,250,0.20); border-radius:var(--radius-sm);"></div>
            </div>
          </sc-for>
        </div>
      </div>

      <!-- live scope placeholder -->
      <div style="display:flex; flex-direction:column; align-items:center; gap:14px; padding:20px 16px; background:var(--bg-raised); border:1px solid var(--border); border-radius:var(--radius-card); box-shadow:var(--shadow-card);">
        <div style="width:100%; display:flex; align-items:center; justify-content:space-between;">
          <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low);">Live scope</span>
          <span style="font:var(--mono-sm); color:var(--phosphor);">online</span>
        </div>
        <div style="margin:8px 0;">
          <x-import component-from-global-scope="HiringRadarDesignSystem_e283cd.HRIllustration" name="empty-radar" size="172" hint-size="172px,172px"></x-import>
        </div>
        <div style="width:100%; display:flex; flex-direction:column; gap:10px;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low); white-space:nowrap;">Next sweep</span>
            <span style="font:var(--mono-sm); color:var(--text-mid); white-space:nowrap;">5h 12m</span>
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-low); white-space:nowrap;">Region</span>
            <span style="font:var(--mono-sm); color:var(--text-mid); white-space:nowrap;">us-remote</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:640},&quot;aiDisabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false}}">
class Component extends DCLogic {
  renderVals() {
    const aiDisabled = !!this.props.aiDisabled;
    return {
      aiDisabled,
      aiEnabled: !aiDisabled,
      rows: [
        { w1: '38%', w2: '62%' },
        { w1: '52%', w2: '44%' },
        { w1: '30%', w2: '70%' },
        { w1: '46%', w2: '54%' },
        { w1: '34%', w2: '60%' },
      ],
    };
  }
}
</script>
</body>
</html>
