<div style="display:flex; align-items:center; height:62px; flex-shrink:0; padding:0 8px calc(6px + env(safe-area-inset-bottom)); background:var(--glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid var(--divider);">

    <span style="font:600 9px/1 var(--font-mono); letter-spacing:0.04em;">Radar</span>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ cBrowse }};">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ cShortlist }};">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    <span style="font:600 9px/1 var(--font-mono); letter-spacing:0.04em;">Shortlist</span>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ cAgent }};">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path></svg>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:{{ cMore }};">

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:62},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;radar&quot;,&quot;browse&quot;,&quot;shortlist&quot;,&quot;agent&quot;,&quot;more&quot;],&quot;default&quot;:&quot;radar&quot;,&quot;tsType&quot;:&quot;'radar'|'browse'|'shortlist'|'agent'|'more'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'radar';
    const on = 'var(--phosphor)', off = 'var(--text-low)';
    return {
      cRadar: active === 'radar' ? on : off,
      cBrowse: active === 'browse' ? on : off,
      cShortlist: active === 'shortlist' ? on : off,
      cAgent: active === 'agent' ? on : off,
      cMore: active === 'more' ? on : off,
    };
  }
}
</script>
</body>
</html>
