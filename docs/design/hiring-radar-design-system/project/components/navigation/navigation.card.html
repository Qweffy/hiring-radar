<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); color: var(--text-body); padding: 22px; }
  .lbl { font: var(--label-mono); letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--text-label); margin-bottom: 12px; }
  .block { margin-bottom: 24px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs, SegmentedControl, ProgressLine } = window.HiringRadarDesignSystem_e283cd;
  function Demo() {
    const [tab, setTab] = React.useState('all');
    const [mode, setMode] = React.useState('hybrid');
    return (
      <div>
        <div className="block">
          <div className="lbl">Filter tabs</div>
          <Tabs value={tab} onChange={setTab} tabs={[
            { value: 'all', label: 'All roles', count: 312 },
            { value: 'new', label: 'New', count: 47 },
            { value: 'saved', label: 'Saved', count: 9 },
            { value: 'applied', label: 'Applied', count: 3 },
          ]} />
        </div>
        <div className="block">
          <div className="lbl">Segmented — search mode</div>
          <SegmentedControl value={mode} onChange={setMode} options={[
            { value: 'semantic', label: 'Semantic', icon: 'bot' },
            { value: 'keyword', label: 'Keyword', icon: 'search' },
            { value: 'hybrid', label: 'Hybrid', icon: 'zap' },
          ]} />
        </div>
        <div className="block" style={{ marginBottom: 0 }}>
          <div className="lbl">Progress — phosphor / violet / indeterminate</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, maxWidth: 360 }}>
            <ProgressLine value={72} />
            <ProgressLine value={45} tone="violet" />
            <ProgressLine indeterminate tone="violet" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
