<!-- @dsCard group="Components" viewport="700x440" name="Forms — Inputs, Select, Slider, Toggle" subtitle="Text/search inputs, selects, salary slider, toggle — with focus & error states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); color: var(--text-body); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; }
  .lbl { font: var(--label-mono); letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--text-label); margin-bottom: 10px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, SearchInput, Select, RangeSlider, Toggle } = window.HiringRadarDesignSystem_e283cd;
  function Demo() {
    const [q, setQ] = React.useState('staff rust remote');
    const [sal, setSal] = React.useState(180);
    const [on, setOn] = React.useState(true);
    const [off, setOff] = React.useState(false);
    return (
      <div className="grid">
        <div>
          <div className="lbl">Search — primary scan field</div>
          <div className="stack">
            <SearchInput value={q} onChange={(e) => setQ(e.target.value)} onClear={() => setQ('')} />
            <SearchInput value="" onChange={() => {}} placeholder="scan postings…" />
          </div>
        </div>
        <div>
          <div className="lbl">Text input — default / icon / error</div>
          <div className="stack">
            <Input value="ada@lovelace.dev" onChange={() => {}} icon="user" />
            <Input value="not-an-email" onChange={() => {}} error="Enter a valid email" />
          </div>
        </div>
        <div>
          <div className="lbl">Select</div>
          <div className="stack">
            <Select value="hybrid"><option value="semantic">Semantic search</option><option value="keyword">Keyword</option><option value="hybrid">Hybrid</option></Select>
            <Select value="" disabled><option value="">Disabled</option></Select>
          </div>
        </div>
        <div>
          <div className="lbl">Salary range + toggle</div>
          <div className="stack">
            <RangeSlider value={sal} onChange={(e) => setSal(+e.target.value)} min={80} max={400} step={5} label="Min base salary" format={(v) => '$' + v + 'K'} />
            <div style={{ display: 'flex', gap: 24 }}>
              <Toggle checked={on} onChange={setOn} label="Remote only" />
              <Toggle checked={off} onChange={setOff} label="Visa sponsor" />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
