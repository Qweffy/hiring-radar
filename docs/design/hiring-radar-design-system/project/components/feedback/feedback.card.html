<!-- @dsCard group="Components" viewport="700x560" name="Feedback — Toasts, Banners, Skeletons, Empty/Error" subtitle="Toasts with retry/undo, banners, shimmer skeletons, empty & recovery error states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); color: var(--text-body); padding: 22px; }
  .lbl { font: var(--label-mono); letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--text-label); margin-bottom: 12px; }
  .block { margin-bottom: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .panel { border: 1px solid var(--border); border-radius: var(--radius-card); background: var(--bg-surface); overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toast, Banner, Skeleton, EmptyState, ErrorState } = window.HiringRadarDesignSystem_e283cd;
  function Demo() {
    return (
      <div>
        <div className="block">
          <div className="lbl">Toasts</div>
          <div className="row">
            <Toast tone="success" title="Sweep complete" message="47 new roles ingested." onClose={() => {}} />
            <Toast tone="error" title="Ingestion failed" message="Couldn't reach the HN API." action="retry" onClose={() => {}} />
            <Toast tone="warning" title="Removed from shortlist" undoSeconds={8} onClose={() => {}} />
          </div>
        </div>
        <div className="block">
          <div className="lbl">Banners</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Banner tone="amber" action actionLabel="Re-run">Last sweep is 31h old — data may be stale.</Banner>
            <Banner tone="violet" action actionLabel="Details">Agent running in degraded mode — using cached embeddings.</Banner>
            <Banner tone="red" action actionLabel="Retry">Database unreachable. Showing your last cached results.</Banner>
          </div>
        </div>
        <div className="block">
          <div className="lbl">Skeletons</div>
          <div className="row">
            <Skeleton variant="card" />
            <div style={{ flex: 1, minWidth: 220, display: 'flex', flexDirection: 'column', gap: 8 }}>
              <Skeleton variant="row" />
              <Skeleton variant="row" />
            </div>
            <Skeleton variant="radar" width={96} height={96} />
          </div>
        </div>
        <div className="block" style={{ marginBottom: 0 }}>
          <div className="lbl">Empty state · Error state</div>
          <div className="row">
            <div className="panel" style={{ flex: 1, minWidth: 260 }}>
              <EmptyState title="No roles yet" description="Run a sweep to scan this month's “Who is hiring” thread." action="Run sweep" actionIcon="play" />
            </div>
            <div className="panel" style={{ flex: 1, minWidth: 260 }}>
              <ErrorState cause="Couldn't reach the database" detail="We'll keep retrying in the background." />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
