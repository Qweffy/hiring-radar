<!-- @dsCard group="Brand" viewport="700x160" name="Logo — radar mark + wordmark" subtitle="Phosphor sweep mark. 'Radar' always in phosphor; clear-space = mark height" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 0; display: flex; }
  .panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 28px; }
  .a { background: var(--bg-void); }
  .b { background: var(--bg-surface); }
  .c { background: var(--bg-raised); border-left: 1px solid var(--divider); }
  img { height: 44px; }
  .mono { height: 40px; }
  .small { height: 22px; }
</style></head>
<body>
  <div class="panel a" style="flex:1.6"><img src="../assets/logo.svg" alt="Hiring Radar" /></div>
  <div class="panel b"><img src="../assets/logomark.svg" class="mono" alt="mark" /></div>
  <div class="panel c"><img src="../assets/logo.svg" class="small" alt="Hiring Radar small" /></div>
</body></html>
