<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px grid" subtitle="space-1…16. Instrument density: tight but breathable" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 20px; display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--phosphor-12); border: 1px solid var(--border-strong); border-radius: 3px; }
  .n { font: var(--mono-sm); color: var(--text-mid); }
  .px { font: 10px var(--font-mono); color: var(--text-low-content); }
</style></head>
<body>
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><span class="n">1</span><span class="px">4</span></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><span class="n">2</span><span class="px">8</span></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><span class="n">3</span><span class="px">12</span></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><span class="n">4</span><span class="px">16</span></div>
  <div class="item"><div class="bar" style="width:20px;height:20px"></div><span class="n">5</span><span class="px">20</span></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><span class="n">6</span><span class="px">24</span></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><span class="n">8</span><span class="px">32</span></div>
  <div class="item"><div class="bar" style="width:48px;height:48px"></div><span class="n">12</span><span class="px">48</span></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><span class="n">16</span><span class="px">64</span></div>
</body></html>
