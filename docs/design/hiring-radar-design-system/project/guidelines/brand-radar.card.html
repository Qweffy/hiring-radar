<!-- @dsCard group="Brand" viewport="700x300" name="Radar motif — conic sweep + blips" subtitle="The core metaphor: 4s linear sweep, blip pings on new signal. Honors reduced-motion" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 0; display: flex; align-items: center; justify-content: center; height: 300px; }
  .scope { position: relative; width: 232px; height: 232px; border-radius: 50%; background: radial-gradient(circle at center, rgba(61,255,162,0.05), transparent 70%); }
  .ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--phosphor-dim); }
  .grid-h, .grid-v { position: absolute; background: var(--phosphor-dim); }
  .grid-h { left: 0; right: 0; top: 50%; height: 1px; }
  .grid-v { top: 0; bottom: 0; left: 50%; width: 1px; }
  .sweep { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; }
  .sweep::before { content: ""; position: absolute; inset: 0;
    background: conic-gradient(from 0deg, rgba(61,255,162,0.45) 0deg, rgba(61,255,162,0.10) 26deg, transparent 60deg);
    animation: sweep 4s linear infinite; }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .blip { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--phosphor); box-shadow: var(--glow-phosphor-sm); }
  .blip::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: var(--phosphor); animation: ping 1.8s var(--ease-out) infinite; }
  @keyframes ping { 0% { transform: scale(1); opacity: 0.7; } 80%,100% { transform: scale(3); opacity: 0; } }
  .b1 { top: 34%; left: 62%; } .b2 { top: 60%; left: 40%; animation-delay: .6s; }
  .v { position: absolute; left: 50%; top: 50%; width: 3px; height: 3px; background: var(--text-low-content); border-radius: 50%; }
  .label { position: absolute; bottom: 16px; left: 16px; font: var(--label-mono); letter-spacing: var(--label-tracking); text-transform: uppercase; color: var(--text-label); }
  @media (prefers-reduced-motion: reduce) { .sweep::before, .blip::after { animation: none; } }
</style></head>
<body>
  <div class="scope">
    <div class="ring"></div>
    <div class="ring" style="inset:38px"></div>
    <div class="ring" style="inset:76px"></div>
    <div class="grid-h"></div><div class="grid-v"></div>
    <div class="sweep"></div>
    <div class="v"></div>
    <div class="blip b1"></div>
    <div class="blip b2" style="background:var(--violet); box-shadow:var(--glow-violet)"></div>
  </div>
  <span class="label">Sweeping · 06:00 UTC</span>
</body></html>
