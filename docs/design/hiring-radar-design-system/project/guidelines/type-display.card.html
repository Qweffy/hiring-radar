<!-- @dsCard group="Type" viewport="700x200" name="Display — Space Grotesk" subtitle="Headings, tight tracking. 600/700 weights" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 20px; }
  .spec { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .meta { font: var(--mono-sm); color: var(--text-low-content); white-space: nowrap; }
  h1,h2,h3 { margin: 0; }
</style></head>
<body>
  <div class="spec"><h1 style="font:var(--text-display); color:var(--text-hi); letter-spacing:var(--tracking-display)">Scanning the market</h1><span class="meta">Display · 40 / 600</span></div>
  <div class="spec"><h2 style="font:var(--text-h1); color:var(--text-hi); letter-spacing:var(--tracking-display)">Signal feed</h2><span class="meta">H1 · 30 / 700</span></div>
  <div class="spec"><h3 style="font:var(--text-h2); color:var(--text-hi); letter-spacing:var(--tracking-tight)">Cortex Labs · Staff Engineer</h3><span class="meta">H2 · 22 / 600</span></div>
  <div class="spec"><h3 style="font:var(--text-h3); color:var(--text-hi)">Match breakdown</h3><span class="meta">H3 · 17 / 600</span></div>
</body></html>
