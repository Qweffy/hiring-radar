<!-- @dsCard group="Type" viewport="700x200" name="Data & labels — JetBrains Mono" subtitle="ALL numbers, codes, timestamps, and uppercase section labels are mono" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 20px; }
  .spec { display: flex; align-items: baseline; gap: 16px; margin-bottom: 13px; }
  .meta { font: var(--mono-sm); color: var(--text-low-content); white-space: nowrap; margin-left: auto; }
</style></head>
<body>
  <div class="spec"><span style="font:var(--mono-xl); color:var(--phosphor)">$210–250K</span><span class="meta">XL · 32 / 600 · scorecards</span></div>
  <div class="spec"><span style="font:var(--mono-lg); color:var(--text-hi)">312 postings · 06:00 UTC</span><span class="meta">LG · 18 / 500 · key data</span></div>
  <div class="spec"><span style="font:var(--mono-base); color:var(--text-mid)">match=0.92 region=us-remote</span><span class="meta">Base · 14 / 500 · tags</span></div>
  <div class="spec"><span style="font:var(--mono-sm); color:var(--text-low-content)">2h ago · id 7f3a91</span><span class="meta">SM · 12 / 500 · timestamps</span></div>
  <div class="spec"><span style="font:var(--label-mono); letter-spacing:var(--label-tracking); text-transform:uppercase; color:var(--text-label)">Signal Feed · Last Sweep 06:00 UTC</span><span class="meta">Label · 11 / 600 · uppercase + 0.14em</span></div>
</body></html>
